# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "YOUR_CLIENT_ID"
name = "encanto-chat-agent"
handle = "encanto-chat-agent"
application_url = "https://shop-chat-agent-encanto-prod.fly.dev"
embedded = true

[build]
include_config_on_deploy = true

[webhooks]
api_version = "2026-04"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "customer_read_customers,customer_read_orders,customer_read_store_credit_account_transactions,customer_read_store_credit_accounts,unauthenticated_read_product_listings,unauthenticated_read_checkouts,unauthenticated_write_checkouts"

[auth]
redirect_urls = [
  "https://shop-chat-agent-encanto-prod.fly.dev/auth/callback",
  "https://shop-chat-agent-encanto-prod.fly.dev/auth/shopify/callback",
  "https://shop-chat-agent-encanto-prod.fly.dev/api/auth/callback"
]

[pos]
embedded = false

[customer_authentication]
redirect_uris = [
  "https://shop-chat-agent-encanto-prod.fly.dev/auth/callback"
]
